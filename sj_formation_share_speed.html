<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>隊形速查 ✦ Super Junior Cover</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F13;--bg2:#1A1A22;--bg3:#22222E;
  --border:#2E2E3E;--border2:#3A3A50;
  --text:#F0EFF8;--text2:#9D9BB8;--text3:#5C5A78;
  --blue:#6C8EFF;--blue-bg:#1A2040;--blue-border:#2E3F7A;
  --glow:#A78BFA;
  --font:'system-ui',-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{padding:12px;max-width:440px;margin:0 auto}

/* header */
.header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:0.5px solid var(--border)}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6C8EFF,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.header-text h1{font-size:14px;font-weight:600;color:var(--text);letter-spacing:0.01em}
.header-text p{font-size:11px;color:var(--text3);margin-top:1px}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--bg2);border-radius:10px;padding:3px;border:0.5px solid var(--border)}
.tab{flex:1;padding:6px 8px;font-size:12px;border-radius:7px;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font)}
.tab.on{background:var(--bg3);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* mirror toggle */
.mirror-box{border-radius:8px;padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;border:0.5px solid var(--border)}
.mirror-box.non{background:var(--blue-bg);border-color:var(--blue-border)}
.mirror-box.mir{background:#201A10;border-color:#5A4010}
.mirror-desc{font-size:11px;color:var(--text2);line-height:1.4}
.mirror-desc b{color:var(--text);font-size:12px}
.mtoggle{display:flex;background:var(--bg3);border-radius:16px;border:0.5px solid var(--border2);overflow:hidden;flex-shrink:0}
.m-btn{padding:4px 10px;font-size:11px;cursor:pointer;border:none;background:transparent;color:var(--text2);white-space:nowrap;font-family:var(--font);transition:all .15s}
.m-btn.on{background:var(--text);color:var(--bg);border-radius:16px;font-weight:500}

/* stage */
.stage-wrap{margin-bottom:8px}
.lr-labels{display:flex;justify-content:space-between;font-size:10px;padding:0 4px;margin-bottom:3px}
.stage{position:relative;width:100%;aspect-ratio:16/10;background:var(--bg2);border-radius:12px;border:0.5px solid var(--border2);overflow:hidden}
.stage-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:25% 33.33%;opacity:0.3;pointer-events:none}
.slabel{position:absolute;font-size:9px;color:var(--text3);pointer-events:none;z-index:1}

/* dot */
.dot{position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;transform:translate(-50%,-50%);border:2px solid transparent;z-index:2;line-height:1.15;padding:2px;transition:left 0.7s cubic-bezier(.4,0,.2,1),top 0.7s cubic-bezier(.4,0,.2,1),width .2s,height .2s,opacity .2s}
.dot .d-role{font-size:8px;font-weight:700;letter-spacing:-0.01em}
.dot .d-name{font-size:6.5px;opacity:0.75}
.dot.sz-n{width:40px;height:40px}
.dot.sz-me{width:50px;height:50px;z-index:5}
.dot.dim{opacity:.2}
.dot.me-ring{box-shadow:0 0 0 3px var(--bg),0 0 0 5px currentColor,0 0 12px 6px rgba(167,139,250,.25)}

/* playback */
.pb-card{background:var(--bg2);border-radius:10px;padding:10px 12px;margin-bottom:10px;border:0.5px solid var(--border)}
.pb-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pb-time{font-size:28px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;min-width:72px;letter-spacing:-0.02em}
.pb-info{flex:1}
.pb-fname{font-size:12px;color:var(--text);font-weight:500}
.pb-next{font-size:10px;color:var(--text3);margin-top:2px}
.progress-bar{height:3px;background:var(--border2);border-radius:2px;margin-bottom:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--glow));border-radius:2px;transition:width .4s linear;width:0%}
.pb-btns{display:flex;gap:6px;margin-bottom:8px}
.pb-btn{flex:1;padding:8px;font-size:12px;font-weight:600;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);transition:opacity .15s}
.pb-btn:active{opacity:.75}
.pb-btn.start{background:linear-gradient(135deg,var(--blue),var(--glow));color:#fff}
.pb-btn.stop{background:#3A1515;color:#FF6B6B;border:0.5px solid #5A2020}
.pb-btn.reset{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2)}
.f-timeline{display:flex;flex-direction:column;gap:3px;max-height:96px;overflow-y:auto}
.ft-item{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;font-size:11px;border:0.5px solid transparent;color:var(--text2)}
.ft-item.active{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue);font-weight:500}
.ft-time{min-width:38px;font-variant-numeric:tabular-nums;font-size:10px}

/* who grid */
.sec-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.who-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:10px}
.who-btn{padding:5px 2px;font-size:9px;border-radius:7px;border:0.5px solid var(--border2);background:var(--bg2);cursor:pointer;text-align:center;line-height:1.3;color:var(--text2);font-family:var(--font);transition:all .15s}
.who-btn:active{transform:scale(.95)}

/* view */
.f-select{width:100%;padding:8px 10px;font-size:13px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);margin-bottom:8px;font-family:var(--font)}
.action-card{border-radius:8px;border:0.5px solid var(--border2);padding:10px 12px;background:var(--bg2);margin-top:8px}
.action-card .al{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.action-card .at{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.7}
.hint{font-size:12px;color:var(--text3);text-align:center;padding:20px 0}

/* scrollbar */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.speed-btns{display:flex;gap:6px;margin-bottom:8px}
.speed-btn{flex:1;padding:6px 0;font-size:12px;font-weight:600;border-radius:8px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.speed-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">💃</div>
    <div class="header-text">
      <h1>隊形速查 ✦ Super Junior Cover</h1>
      <p>非鏡面版本｜52 個隊形</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="switchMode('play')">▶ 播放</button>
    <button class="tab" onclick="switchMode('view')">🔍 查詢</button>
  </div>

  <!-- PLAY -->
  <div id="playMode">
    <div class="mirror-box non" id="playMirrorBox">
      <div class="mirror-desc" id="playMirrorDesc"></div>
      <div class="mtoggle">
        <button class="m-btn on" id="pBtnNon" onclick="setPlayMirror(false)">非鏡面</button>
        <button class="m-btn" id="pBtnMir" onclick="setPlayMirror(true)">鏡面</button>
      </div>
    </div>

    <p class="sec-label">我是誰？</p>
    <div class="who-grid" id="playWhoGrid"></div>

    <div class="pb-card">
      <div class="pb-top">
        <div class="pb-time" id="pbTime">0:00</div>
        <div class="pb-info">
          <div class="pb-fname" id="pbFName">按開始後自動切換隊形</div>
          <div class="pb-next" id="pbNext"></div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="speed-btns">
        <button class="speed-btn" data-s="0.8" onclick="setSpeed(0.8)">0.8x</button>
        <button class="speed-btn" data-s="0.9" onclick="setSpeed(0.9)">0.9x</button>
        <button class="speed-btn active" data-s="1.0" onclick="setSpeed(1.0)">1.0x</button>
      </div>
      <div class="pb-btns">
        <button class="pb-btn start" id="startBtn" onclick="startPlay()">▶ 開始</button>
        <button class="pb-btn stop" id="stopBtn" onclick="stopPlay()" style="display:none">⏹ 停止</button>
        <button class="pb-btn reset" onclick="resetPlay()">↺ 重置</button>
      </div>
      <div class="f-timeline" id="fTimeline"></div>
    </div>

    <div class="stage-wrap">
      <div class="lr-labels" id="playLR"></div>
      <div class="stage" id="playStage">
        <div class="stage-grid"></div>
        <span class="slabel" style="top:5px;left:50%;transform:translateX(-50%)">舞台前方</span>
        <span class="slabel" style="bottom:4px;left:50%;transform:translateX(-50%)">後方</span>
      </div>
    </div>
    <div id="playAction"></div>

    <!-- Video at bottom -->
    <div style="width:100%;background:#000;border-radius:10px;overflow:hidden;margin-top:10px">
      <video id="videoFrame" src="0610.mp4" controls playsinline style="width:100%;display:block;max-height:310px"></video>
    </div>
  </div>

  <!-- VIEW -->
  <div id="viewMode" style="display:none">
    <div class="mirror-box non" id="viewMirrorBox">
      <div class="mirror-desc" id="viewMirrorDesc"></div>
      <div class="mtoggle">
        <button class="m-btn on" id="vBtnNon" onclick="setViewMirror(false)">非鏡面</button>
        <button class="m-btn" id="vBtnMir" onclick="setViewMirror(true)">鏡面</button>
      </div>
    </div>
    <p class="sec-label">我是誰？</p>
    <div class="who-grid" id="whoGrid"></div>
    <select class="f-select" id="viewFSel" onchange="renderViewStage()">
      <option value="">選擇隊形...</option>
    </select>
    <div class="stage-wrap">
      <div class="lr-labels" id="viewLR"></div>
      <div class="stage" id="viewStage">
        <div class="stage-grid"></div>
        <span class="slabel" style="top:5px;left:50%;transform:translateX(-50%)">舞台前方</span>
        <span class="slabel" style="bottom:4px;left:50%;transform:translateX(-50%)">後方</span>
      </div>
    </div>
    <div id="viewAction"><p class="hint">選好隊形和名字就能看到你的位置</p></div>
  </div>
</div>

  document.getElementById('viewMode').style.display=m==='view'?'block':'none';
  document.querySelectorAll('.tabs .tab').forEach((t,i)=>t.classList.toggle('on',['play','view'][i]===m));
  if(m==='view'){renderWhoGrid();renderViewFSel();renderViewStage();}
  if(m==='play'){renderPlayWhoGrid();renderTimeline();if(currentFIdx>=0)renderPlayStageAt(currentFIdx);else renderPlayStageAt(0);}
}

function makeDot(i,x,y,who){
  const d=document.createElement('div');
  d.className='dot sz-n';d.dataset.idx=i;
  d.style.background=COLORS[i].light;
  d.style.color=COLORS[i].bg;
  d.style.left=x+'%';d.style.top=y+'%';
  const role=document.createElement('span');role.className='d-role';role.textContent=MEMBERS[i].role;
  const name=document.createElement('span');name.className='d-name';
  const n=MEMBERS[i].name;name.textContent=n.length>4?n.slice(0,4):n;
  d.appendChild(role);d.appendChild(name);
  d.title=MEMBERS[i].role+' / '+MEMBERS[i].name;
  applyWhoStyle(d,i,who);
  return d;
}
function applyWhoStyle(d,i,who){
  d.classList.remove('sz-me','dim','me-ring');
  d.style.boxShadow='';
  if(who===null){d.classList.add('sz-n');}
  else if(i===who){
    d.classList.remove('sz-n');d.classList.add('sz-me','me-ring');
    d.style.color=COLORS[i].bg;
  } else {
    d.classList.add('sz-n','dim');
  }
}

// PLAY WHO GRID
function renderPlayWhoGrid(){
  const g=document.getElementById('playWhoGrid');g.innerHTML='';
  const all=document.createElement('button');
  all.className='who-btn'+(playWho===null?' on':'');
  if(playWho===null){all.style.background='#22222E';all.style.color='#F0EFF8';all.style.borderColor='#3A3A50';}
  all.innerHTML='<div style="font-size:9px;font-weight:600">全部</div>';
  all.onclick=()=>{playWho=null;renderPlayWhoGrid();refreshPlayDots();};
  g.appendChild(all);
  MEMBERS.forEach((m,i)=>{
    const b=document.createElement('button');
    b.className='who-btn'+(playWho===i?' on':'');
    if(playWho===i){b.style.background=COLORS[i].light;b.style.color=COLORS[i].bg;b.style.borderColor=COLORS[i].light;}
    b.innerHTML=`<div style="font-size:9px;font-weight:600">${m.name}</div><div style="font-size:8px;opacity:.65">${m.role}</div>`;
    b.onclick=()=>{playWho=i;renderPlayWhoGrid();refreshPlayDots();};
    g.appendChild(b);
  });
}

function renderWhoGrid(){
  const g=document.getElementById('whoGrid');g.innerHTML='';
  MEMBERS.forEach((m,i)=>{
    const b=document.createElement('button');
    b.className='who-btn'+(viewWho===i?' on':'');
    if(viewWho===i){b.style.background=COLORS[i].light;b.style.color=COLORS[i].bg;b.style.borderColor=COLORS[i].light;}
    b.innerHTML=`<div style="font-size:9px;font-weight:600">${m.name}</div><div style="font-size:8px;opacity:.65">${m.role}</div>`;
    b.onclick=()=>{viewWho=i;renderWhoGrid();renderViewStage();};
    g.appendChild(b);
  });
}

function renderTimeline(){
  const tl=document.getElementById('fTimeline');tl.innerHTML='';
  formations.forEach((f,i)=>{
    const div=document.createElement('div');
    div.className='ft-item'+(i===currentFIdx?' active':'');
    div.id='fti-'+i;
    div.style.cursor='pointer';
    div.innerHTML=`<span class="ft-time">${fmtTime(f.startTime)}</span><span style="flex:1">${f.name}</span><span style="font-size:9px;opacity:.4;padding-left:4px">▶</span>`;
    div.onclick=()=>jumpTo(i);
    tl.appendChild(div);
  });
}

function jumpTo(idx){
  clearInterval(playTimer);playTimer=null;
  playElapsed=formations[idx].startTime;
  currentFIdx=idx;
  document.getElementById('playStage').querySelectorAll('.dot').forEach(d=>d.remove());
  renderPlayStageAt(idx);
  renderTimeline();
  document.getElementById('pbTime').textContent=fmtTime(playElapsed);
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='block';
  document.getElementById('startBtn').textContent='▶ 繼續';
  const video=document.getElementById('videoFrame');
  if(video){video.currentTime=playElapsed;video.play();}
  playStartTime=Date.now()-playElapsed*1000;
  playTimer=setInterval(tick,100);
}

function refreshPlayDots(){
  const stage=document.getElementById('playStage');
  MEMBERS.forEach((_,i)=>{
    const d=stage.querySelector('.dot[data-idx="'+i+'"]');
    if(d)applyWhoStyle(d,i,playWho);
  });
}

function renderPlayStageAt(idx){
  const stage=document.getElementById('playStage');
  const pa=document.getElementById('playAction');
  if(idx<0||idx>=formations.length){stage.querySelectorAll('.dot').forEach(d=>d.remove());return;}
  const f=formations[idx];
  const existing=stage.querySelectorAll('.dot');
  if(existing.length===0){
    MEMBERS.forEach((_,i)=>{
      const pos=f.positions[i]||{x:50,y:50};
      const d=makeDot(i,toDisp(pos.x,playMirror),pos.y,playWho);
      stage.appendChild(d);
    });
  } else {
    MEMBERS.forEach((_,i)=>{
      const pos=f.positions[i]||{x:50,y:50};
      const d=stage.querySelector('.dot[data-idx="'+i+'"]');
      if(d){d.style.left=toDisp(pos.x,playMirror)+'%';d.style.top=pos.y+'%';applyWhoStyle(d,i,playWho);}
    });
  }
  const act=f.actions||'';
  pa.innerHTML=act?`<div class="action-card"><div class="al">📋 ${f.name}</div><div class="at">${act}</div></div>`:'';
  document.getElementById('pbFName').textContent='目前：'+f.name;
  const next=formations[idx+1];
  document.getElementById('pbNext').textContent=next?'下一個：'+next.name+' ('+fmtTime(next.startTime)+')':'最後一個隊形';
  document.querySelectorAll('.ft-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  const ae=document.getElementById('fti-'+idx);
  if(ae)ae.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function setSpeed(s){
  playSpeed=s;
  document.querySelectorAll('.speed-btn').forEach(b=>{
    b.classList.toggle('active', parseFloat(b.dataset.s)===s);
  });
  const v=document.getElementById('videoFrame');
  if(v && !v.paused) v.playbackRate=s;
}
function startPlay(){
  const btn=document.getElementById('startBtn');
  btn.disabled=true;
  let count=3;
  btn.textContent='▶ '+count+'...';
  const cd=setInterval(()=>{
    count--;
    if(count>0){
      btn.textContent='▶ '+count+'...';
    } else {
      clearInterval(cd);
      // 真正控制 video 播放
      const video=document.getElementById('videoFrame');
      if(video){
        video.currentTime=playElapsed;
        video.playbackRate=playSpeed;
        video.play();
      }
      btn.style.display='none';
      btn.disabled=false;
      document.getElementById('stopBtn').style.display='block';
      playStartTime=Date.now()-playElapsed*1000;
      playTimer=setInterval(tick,100);
    }
  },1000);
}
function stopPlay(){
  clearInterval(playTimer);playTimer=null;
  const _vs=document.getElementById('videoFrame');
  playElapsed=_vs?_vs.currentTime:(Date.now()-playStartTime)/1000;
  const video=document.getElementById('videoFrame');
  if(video) video.pause();
  document.getElementById('startBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('startBtn').textContent='▶ 繼續';
}
function resetPlay(){
  clearInterval(playTimer);playTimer=null;
  playElapsed=0;playStartTime=null;currentFIdx=-1;
  const video=document.getElementById('videoFrame');
  if(video){video.pause();video.currentTime=0;}
  document.getElementById('startBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('startBtn').textContent='▶ 開始';
  document.getElementById('pbTime').textContent='0:00';
  document.getElementById('pbFName').textContent='按開始後自動切換隊形';
  document.getElementById('pbNext').textContent='';
  document.getElementById('progressFill').style.width='0%';
  renderTimeline();
  document.getElementById('playStage').querySelectorAll('.dot').forEach(d=>d.remove());
}
function tick(){
  const _v=document.getElementById('videoFrame');
  const elapsed=_v?_v.currentTime:(Date.now()-playStartTime)/1000;
  playElapsed=elapsed;
  document.getElementById('pbTime').textContent=fmtTime(elapsed);
  let idx=-1;
  for(let i=0;i<formations.length;i++){if(elapsed>=formations[i].startTime)idx=i;else break;}
  if(idx>=0&&idx<formations.length-1){
    const pct=Math.min(100,(elapsed-formations[idx].startTime)/(formations[idx+1].startTime-formations[idx].startTime)*100);
    document.getElementById('progressFill').style.width=pct+'%';
  } else if(idx===formations.length-1){document.getElementById('progressFill').style.width='100%';}
  if(idx!==currentFIdx){currentFIdx=idx;if(idx>=0)renderPlayStageAt(idx);}
}

function renderViewFSel(){
  const sel=document.getElementById('viewFSel');
  sel.innerHTML='<option value="">選擇隊形...</option>';
  formations.forEach((f,i)=>{const o=document.createElement('option');o.value=i;o.textContent=f.name+' ('+fmtTime(f.startTime)+')';sel.appendChild(o);});
}
function renderViewStage(){
  const sel=document.getElementById('viewFSel');const fi=sel.value;
  const stage=document.getElementById('viewStage');
  stage.querySelectorAll('.dot').forEach(d=>d.remove());
  const va=document.getElementById('viewAction');
  if(fi===''){va.innerHTML='<p class="hint">選好隊形和名字就能看到你的位置</p>';return;}
  const f=formations[fi];
  MEMBERS.forEach((_,i)=>{
    const pos=f.positions[i]||{x:50,y:50};
    const d=makeDot(i,toDisp(pos.x,viewMirror),pos.y,viewWho);
    stage.appendChild(d);
  });
  const act=f.actions||'';
  va.innerHTML=act?`<div class="action-card"><div class="al">📋 ${f.name} 的動作說明</div><div class="at">${act}</div></div>`:(viewWho===null?'<p class="hint">點上方名字可以只顯示你的位置</p>':'');
}

// init
applyMirrorUI('playMirrorBox',true,'playMirrorDesc','pBtnNon','pBtnMir','playLR');
applyMirrorUI('viewMirrorBox',true,'viewMirrorDesc','vBtnNon','vBtnMir','viewLR');
renderPlayWhoGrid();
renderTimeline();
renderPlayStageAt(0);
</script>
</body>
